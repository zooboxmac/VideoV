<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Ristorante Live</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: black; 
        }
        video { 
            width: 100vw; 
            height: 100vh; 
            object-fit: cover; 
            display: block;
        }
    </style>
</head>
<body>

    <video id="videoPlayer" autoplay muted playsinline></video>

<script>
    // --- CONFIGURAZIONE ---
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyPx6xy7SFY3ubBLLRwp6Lfa3LCnMaTsDzHcxZjaj-qBCiKYkWsn5bMo2Us6swPTkajSg/exec';
    
    const videoPlayer = document.getElementById('videoPlayer');
    let videoList = [];
    let currentIndex = 0;

    // Funzione per recuperare la lista dei video
    async function loadPlaylist() {
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            
            if (data && data.length > 0) {
                videoList = data;
                // Se è il primo avvio, facciamo partire il primo video
                if (!videoPlayer.src || videoPlayer.src === "") {
                    playVideo(0);
                }
            }
        } catch (e) {
            console.error("Errore nel recupero della playlist:", e);
        }
    }

    // Funzione per riprodurre il video
    function playVideo(index) {
        if (videoList.length === 0) return;
        
        if (index >= videoList.length) index = 0;
        currentIndex = index;
        
        const videoId = videoList[currentIndex];
        
        // Link ottimizzato per bypassare alcuni blocchi dei browser Smart TV
        // Il #.mp4 finale "inganna" il browser facendogli capire che è un file video puro
        videoPlayer.src = `https://drive.google.com/uc?export=download&id=${videoId}&v=${Date.now()}#.mp4`;
        
        videoPlayer.load();
        
        // Tenta la riproduzione
        const playPromise = videoPlayer.play();
        
        if (playPromise !== undefined) {
            playPromise.catch(error => {
                console.log("Riproduzione automatica bloccata. Riprovo...");
                // Alcuni browser richiedono un tentativo extra dopo un errore
                setTimeout(() => videoPlayer.play(), 1000);
            });
        }
    }

    // Passaggio automatico al video successivo
    videoPlayer.onended = () => {
        playVideo(currentIndex + 1);
    };

    // Gestione errori di caricamento (es. file troppo grande o rete instabile)
    videoPlayer.onerror = () => {
        console.error("Errore caricamento video, salto al prossimo tra 3 secondi...");
        setTimeout(() => playVideo(currentIndex + 1), 3000);
    };

    // --- AVVIO ---
    loadPlaylist();

    // Ricontrolla la cartella Drive ogni 5 minuti per vedere se ci sono nuovi video
    setInterval(loadPlaylist, 300000);

</script>
</body>
</html>
