<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Ristorante Live</title>
    <style>
        /* Setup Schermo Intero */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: black; 
        }
        /* Il video copre tutto lo schermo senza deformarsi */
        video { 
            width: 100vw; 
            height: 100vh; 
            object-fit: cover; 
            display: block;
        }
    </style>
</head>
<body>

    <video id="videoPlayer" autoplay muted playsinline></video>

<script>
    // --- IL TUO LINK AGGIORNATO ---
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyPx6xy7SFY3ubBLLRwp6Lfa3LCnMaTsDzHcxZjaj-qBCiKYkWsn5bMo2Us6swPTkajSg/exec';
    
    const videoPlayer = document.getElementById('videoPlayer');
    let videoList = [];
    let currentIndex = 0;

    // Funzione per caricare la lista dei video dallo Script
    async function loadPlaylist() {
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            
            if (data && data.length > 0) {
                videoList = data;
                // Se è la prima volta che carica o il player è vuoto, avvia il primo video
                if (!videoPlayer.src) {
                    playVideo(0);
                }
            }
        } catch (e) {
            console.error("Errore nel recupero della playlist:", e);
        }
    }

    // Funzione per riprodurre un video specifico
    function playVideo(index) {
        if (videoList.length === 0) return;
        
        // Se arriviamo alla fine della lista, ricomincia da capo
        if (index >= videoList.length) index = 0;
        currentIndex = index;
        
        // Link diretto per il download/streaming da Drive
        const videoId = videoList[currentIndex];
        videoPlayer.src = `https://drive.google.com/uc?export=download&id=${videoId}`;
        
        // Forza il caricamento e l'avvio
        videoPlayer.load();
        videoPlayer.play().catch(error => {
            console.log("Autoplay bloccato o errore: ", error);
        });
    }

    // Quando un video finisce, passa automaticamente al prossimo
    videoPlayer.onended = () => {
        playVideo(currentIndex + 1);
    };

    // --- AVVIO E AUTOMAZIONE ---

    // Carica la playlist all'apertura
    loadPlaylist();

    // Ogni 5 minuti controlla se il cameriere ha aggiunto o rimosso video
    // (Non interrompe il video corrente, aggiorna solo la lista per il prossimo ciclo)
    setInterval(loadPlaylist, 300000);

    // Gestione errori: se il video si blocca per problemi di rete, riprova dopo 5 secondi
    videoPlayer.onerror = () => {
        console.log("Errore nel video corrente, salto al prossimo...");
        setTimeout(() => playVideo(currentIndex + 1), 5000);
    };

</script>
</body>
</html>
