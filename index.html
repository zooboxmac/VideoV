<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Ristorante Pro</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: black; }
        video { width: 100vw; height: 100vh; object-fit: cover; display: block; }
        /* Messaggio invisibile che appare solo se l'autoplay fallisce */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; justify-content: center; align-items: center;
            color: white; font-family: sans-serif; background: rgba(0,0,0,0.8);
            z-index: 10; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="startExecution()">Clicca ovunque per avviare il monitor</div>
    
    <video id="videoPlayer" autoplay muted playsinline></video>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyPx6xy7SFY3ubBLLRwp6Lfa3LCnMaTsDzHcxZjaj-qBCiKYkWsn5bMo2Us6swPTkajSg/exec';
    const videoPlayer = document.getElementById('videoPlayer');
    const overlay = document.getElementById('overlay');
    let videoList = [];
    let currentIndex = 0;

    async function loadPlaylist() {
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            if (data && data.length > 0) {
                videoList = data;
                if (!videoPlayer.src || videoPlayer.src === "") {
                    playVideo(0);
                }
            }
        } catch (e) { console.error("Errore playlist", e); }
    }

    function playVideo(index) {
        if (videoList.length === 0) return;
        if (index >= videoList.length) index = 0;
        currentIndex = index;
        
        const videoId = videoList[currentIndex];
        // Forziamo il caricamento pulito
        videoPlayer.src = `https://drive.google.com/uc?export=download&id=${videoId}&v=${Date.now()}#.mp4`;
        videoPlayer.load();
        
        videoPlayer.play().catch(error => {
            console.log("Autoplay bloccato. Mostro overlay di attivazione.");
            overlay.style.display = 'flex';
        });
    }

    function startExecution() {
        overlay.style.display = 'none';
        videoPlayer.play();
    }

    videoPlayer.onended = () => playVideo(currentIndex + 1);
    
    videoPlayer.onerror = () => {
        setTimeout(() => playVideo(currentIndex + 1), 3000);
    };

    // Avvio
    loadPlaylist();
    setInterval(loadPlaylist, 300000);
</script>
</body>
</html>
